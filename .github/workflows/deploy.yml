# Сборка и выкладка статики на VPS по SSH (rsync).
# Секреты репозитория: Settings → Secrets and variables → Actions.
name: Deploy to VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run lint
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Rsync dist to VPS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "${SSH_PRIVATE_KEY:-}" || { echo "Missing VPS_SSH_PRIVATE_KEY"; exit 1; }
          test -n "${VPS_HOST:-}" || { echo "Missing VPS_HOST"; exit 1; }
          test -n "${VPS_USER:-}" || { echo "Missing VPS_USER"; exit 1; }
          test -n "${VPS_DEPLOY_PATH:-}" || { echo "Missing VPS_DEPLOY_PATH"; exit 1; }

          PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          # VPS_DEPLOY_PATH должен заканчиваться на / (например /var/www/app/)
          DEST="${VPS_DEPLOY_PATH}"
          case "$DEST" in */) ;; *) DEST="${DEST}/" ;; esac

          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" \
            dist/ "${VPS_USER}@${VPS_HOST}:${DEST}"
