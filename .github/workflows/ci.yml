# Проверки при push и в pull request (без деплоя).
name: CI

# Push в main/master только в Deploy — здесь не дублируем сборку.
on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
  push:
    branches-ignore:
      - main
      - master

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
