# Пример server {} для статики Vite + React Router (SPA).
# Скопируйте в /etc/nginx/sites-available/ и подключите sites-enabled.
# Замените server_name и root на свои пути.

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    root /var/www/asdawd;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Content-Security-Policy: замените YOUR_PROJECT на ref проекта Supabase и при необходимости
    # добавьте домены шрифтов (fonts.googleapis.com / gstatic) и аналитики.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://YOUR_PROJECT.supabase.co wss://YOUR_PROJECT.supabase.co https://*.supabase.co wss://*.supabase.co;" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
